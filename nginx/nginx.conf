events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=apilimit:10m rate=100r/m;

    upstream rain-api {
        server rain-prediction-api:8502;
    }

    # HTTP to HTTPS Global Redirect
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ========================================================
    # PORT 443: CENTRAL SECURE GATEWAY (API + MONITORING)
    # ========================================================
    server {
        listen 443 ssl default_server;
        server_name _;

        # SSL Certificates
        ssl_certificate /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        # DDoS Protection
        client_max_body_size 1M;

        # --------------------------------------------------------
        # FastAPI Endpoints (Public)
        # --------------------------------------------------------
        location /health { proxy_pass http://rain-api; }
        location /locations { proxy_pass http://rain-api; }
        location /docs { proxy_pass http://rain-api; }
        location /openapi.json { proxy_pass http://rain-api; }

        # --------------------------------------------------------
        # FastAPI Endpoints (Protected)
        # --------------------------------------------------------
        location /predict {
            auth_basic "Restricted API";
            auth_basic_user_file /etc/nginx/.htpasswd;
            limit_req zone=apilimit burst=20 nodelay;

            # User Header Injection
            proxy_set_header X-Forwarded-User $remote_user;
            proxy_pass http://rain-api;
        }

        location /predict/batch {
            auth_basic "Restricted API";
            auth_basic_user_file /etc/nginx/.htpasswd;
            limit_req zone=apilimit burst=10 nodelay;

            # User Header Injection
            proxy_set_header X-Forwarded-User $remote_user;
            proxy_pass http://rain-api;
        }

        location /model {
            auth_basic "Restricted Admin";
            auth_basic_user_file /etc/nginx/.htpasswd;

            # User Header Injection
            proxy_set_header X-Forwarded-User $remote_user;
            proxy_pass http://rain-api;
        }

        location /metrics {
            auth_basic "Restricted Admin";
            auth_basic_user_file /etc/nginx/.htpasswd;

            # User Header Injection
            proxy_set_header X-Forwarded-User $remote_user;
            proxy_pass http://rain-api;
        }

        # --------------------------------------------------------
        # Airflow Reverse Proxy via Subpath
        # --------------------------------------------------------
        location /airflow/ {
            auth_basic "Restricted Airflow";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://rain-prediction-airflow:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }


        # --------------------------------------------------------
        # Grafana Reverse Proxy via Subpath
        # --------------------------------------------------------
        location /grafana/ {
            auth_basic "Restricted Grafana";
            auth_basic_user_file /etc/nginx/.htpasswd;

            # The trailing '/' strips '/grafana' when forwarding to the container
            proxy_pass http://grafana:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket Support for Live Updates
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # --------------------------------------------------------
        # Prometheus Reverse Proxy via Subpath
        # --------------------------------------------------------
        location /prometheus/ {
            auth_basic "Restricted Prometheus";
            auth_basic_user_file /etc/nginx/.htpasswd;

            # The trailing '/' strips '/prometheus' when forwarding to the container
            proxy_pass http://prometheus:9090;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --------------------------------------------------------
        # MLflow Reverse Proxy via Subpath
        # --------------------------------------------------------
        location /mlflow/ {
            auth_basic "Restricted MLflow";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://mlflow:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Catch-All for undefined paths
        location / { return 404; }
    }
}
