events {
    worker_connections 1024;
}

http {
    # Rate Limiting Zone (DDoS Schutz)
    limit_req_zone $binary_remote_addr zone=apilimit:10m rate=100r/m;

    # Docker DNS resolver for scaled FastAPI containers.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # HTTP → HTTPS Redirect
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS Server
    server {
        listen 443 ssl;
        server_name _;
        set $rain_api http://fastapi:8502;

        # SSL Zertifikate
        ssl_certificate /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Größenbeschränkung (DDoS Schutz)
        client_max_body_size 1M;

        # ========== ÖFFENTLICHE ENDPUNKTE (KEINE AUTH) ==========
        location /health {
            proxy_pass $rain_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /locations {
            proxy_pass $rain_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /docs {
            proxy_pass $rain_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /openapi.json {
            proxy_pass $rain_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========== GESCHÜTZTE ENDPUNKTE (BASIC AUTH + RATE LIMITING) ==========
        location /predict {
            auth_basic "Restricted Area";
            auth_basic_user_file /etc/nginx/.htpasswd;
            limit_req zone=apilimit burst=20 nodelay;

            proxy_pass $rain_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-User $remote_user;
        }

        location /predict/batch {
            auth_basic "Restricted Area";
            auth_basic_user_file /etc/nginx/.htpasswd;
            limit_req zone=apilimit burst=10 nodelay;

            proxy_pass $rain_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-User $remote_user;
        }

        # ========== ADMIN ENDPUNKTE (BASIC AUTH + ROLLENPRÜFUNG DURCH FASTAPI) ==========
        location /model {
            auth_basic "Restricted Area";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass $rain_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-User $remote_user;
        }

        location /metrics {
            auth_basic "Restricted Area";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass $rain_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-User $remote_user;
        }

        # ========== ALLES ANDERE BLOCKIEREN ==========
        location / {
            return 404;
        }

        # Nginx Status (optional, nur für Monitoring)
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }
    }
}
