global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/alert_rules.yml"

scrape_configs:
  # 1. Scrapes ML and application metrics directly from internal FastAPI replicas
  - job_name: 'fastapi-internal'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'fastapi:8502'

  # 2. Scrapes hardware and OS metrics from the server infrastructure
  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - 'node-exporter:9100'

  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']
