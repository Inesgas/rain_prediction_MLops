global:
  scrape_interval: 15s
  evaluation_interval: 15s
rule_files:
  - "rules/alert_rules.yml"
scrape_configs:
  # Scrape each FastAPI pod individually instead of the Service ClusterIP.
  # A Service address load-balances each scrape to a random pod, which makes
  # each pod's counter appear to jump around ("sawtooth") from Prometheus'
  # point of view. That breaks rate()/increase() calculations, since a drop
  # in the observed value gets misread as a counter reset. Scraping the pods
  # directly gives each replica its own stable, monotonically increasing
  # time series.
  - job_name: 'fastapi-internal'
    metrics_path: '/metrics'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - rain-prediction
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: rain-prediction-api
        action: keep
      - source_labels: [__meta_kubernetes_pod_ip]
        target_label: __address__
        replacement: '${1}:8502'
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: instance

  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - 'node-exporter:9100'

  - job_name: 'pushgateway'
    honor_labels: true
    static_configs:
      - targets:
          - 'pushgateway:9091'