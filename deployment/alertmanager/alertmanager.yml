global:
  resolve_timeout: 5m
  smtp_smarthost: 'mail.gmx.net:587'
  smtp_from: 'gnembac70@gmx.de'
  smtp_auth_username: 'gnembac70@gmx.de'
  smtp_auth_password_file: '/etc/alertmanager/secrets/smtp_password'
  smtp_require_tls: true

route:
  receiver: email-notifications
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: email-notifications
    email_configs:
      - to: 'gnembac70@gmail.com'
        send_resolved: true
