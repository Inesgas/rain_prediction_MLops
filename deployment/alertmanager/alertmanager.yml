global:
  resolve_timeout: 5m

route:
  receiver: default-receiver
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: default-receiver
    # No external integration configured yet. Alerts are visible in the
    # Alertmanager UI (https://<gateway>/alertmanager/) but nothing is sent
    # externally. Add a real channel once credentials exist, e.g.:
    #
    # webhook_configs:
    #   - url: 'https://hooks.slack.com/services/XXX/YYY/ZZZ'
