name: CI

on:
  push:
  pull_request:

jobs:
  python-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install API test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docker/prediction-api/api_requirements.txt
          python -m pip install pytest httpx

      - name: Compile orchestration and API code
        run: |
          python -m py_compile \
            airflow/dags/data_model_versioning_dag.py \
            airflow/dags/daily_weather_ingestion_dag.py \
            airflow/dags/end_to_end_mlops_dag.py \
            src/data/check_data_freshness.py \
            src/data/extract_open_meteo_daily.py \
            src/data/extract_weather_data.py \
            src/versioning/dvc_versioning.py \
            src/versioning/mlflow_tracking.py \
            src/prediction_api/main.py \
            tests/test_dependency_pins.py \
            tests/test_mlflow_tracking.py \
            tests/test_prediction_api_contract.py

      - name: MLflow tracking dry run
        run: python -m src.versioning.mlflow_tracking log-model --dry-run --no-register-model --run-id ci

      - name: FastAPI contract tests
        run: python -m pytest tests/test_dependency_pins.py tests/test_mlflow_tracking.py tests/test_prediction_api_contract.py

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build FastAPI image
        run: docker build -f docker/prediction-api/api.Dockerfile -t rain-prediction-api:ci .

      - name: Build Airflow image
        run: docker build -f docker/airflow/airflow.Dockerfile -t rain-prediction-airflow:ci .
