apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-config
  namespace: rain-prediction
data:
  AIRFLOW_PROJECT_DIR: /opt/airflow/project
  AIRFLOW__CORE__EXECUTOR: CeleryExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
  AIRFLOW__CORE__PARALLELISM: "32"
  AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "16"
  AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG: "1"
  AIRFLOW__WEBSERVER__BASE_URL: https://localhost/airflow
  AIRFLOW__WEBSERVER__WEB_SERVER_URL_PREFIX: /airflow
  AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "true"
  AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"
  AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: "300"
  MLFLOW_TRACKING_URI: http://mlflow:5000
  MLFLOW_EXPERIMENT_NAME: rain_prediction_winner
  MLFLOW_REGISTERED_MODEL_NAME: rain_prediction_final_winner
  MLFLOW_REGISTER_MODEL: "true"
  PUSHGATEWAY_URL: pushgateway:9091
  AIRFLOW__CELERY__WORKER_CONCURRENCY: "1"
  AIRFLOW__WEBSERVER__WORKERS: "2"
  AIRFLOW__SCHEDULER__SCHEDULER_HEALTH_CHECK_SERVER_PORT: "8974"
  AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
  AIRFLOW__LOGGING__DAG_PROCESSOR_MANAGER_LOG_LOCATION: /opt/airflow/logs/dag_processor_manager/dag_processor_manager.log
  MLOPS_E2E_SCHEDULE: "0 6 * * *"
  MODEL_VERSIONING_SCHEDULE: "0 4 * * *"
  DRIFT_MONITORING_SCHEDULE: "0 7 * * *"
