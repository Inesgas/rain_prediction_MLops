apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rain-prediction-airflow-worker
  namespace: rain-prediction
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rain-prediction-airflow-worker
  minReplicas: 2
  maxReplicas: 3
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 1800
      policies:
        - type: Pods
          value: 1
          periodSeconds: 1800
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Max
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
