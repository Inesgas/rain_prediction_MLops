apiVersion: apps/v1
kind: Deployment
metadata:
  name: pushgateway
  namespace: rain-prediction
  labels:
    app: pushgateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pushgateway
  template:
    metadata:
      labels:
        app: pushgateway
    spec:
      containers:
        - name: pushgateway
          image: prom/pushgateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9091
              name: http
