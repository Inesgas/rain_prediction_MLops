apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-pod-reader
rules:
  - apiGroups: [""]
    resources:
      - pods
      - services
      - endpoints
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-pod-reader-binding
subjects:
  - kind: ServiceAccount
    name: default
    namespace: rain-prediction
roleRef:
  kind: ClusterRole
  name: prometheus-pod-reader
  apiGroup: rbac.authorization.k8s.io
