apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rain-prediction-api
  namespace: rain-prediction
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rain-prediction-api
  minReplicas: 3
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
