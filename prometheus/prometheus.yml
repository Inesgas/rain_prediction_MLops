global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # 1. Sammelt die ML- und Anwendungsdaten deiner FastAPI
  - job_name: 'fastapi'
    metrics_path: '/metrics'
    static_configs:
      - targets: 
          - 'fastapi:8502'

  # 2. NEU: Sammelt die Infrastrukturdaten deines Servers für Grafana
  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - 'node-exporter:9100'
