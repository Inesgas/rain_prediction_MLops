services:
  prediction:
    build:
      context: ../..
      dockerfile: src/docker/prediction/prediction.Dockerfile
    image: rain-prediction-api:winner
    container_name: rain_prediction_api
    expose:
      - "8000"
    environment:
      - PREDICTION_API_CORS_ORIGINS=${PREDICTION_API_CORS_ORIGINS:-http://localhost:8501,http://127.0.0.1:8501}
      - PREDICTION_API_MAX_REQUEST_BYTES=${PREDICTION_API_MAX_REQUEST_BYTES:-65536}
      - PREDICTION_API_WORKERS=${PREDICTION_API_WORKERS:-1}
    volumes:
      - ../../src:/app/src:ro
      - ../../models:/app/models:ro

  gateway:
    build:
      context: ../..
      dockerfile: src/docker/gateway/gateway.Dockerfile
    image: rain-prediction-gateway:local
    container_name: rain_prediction_gateway
    ports:
      - "8000:80"
    depends_on:
      - prediction

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.2
    container_name: rain_prediction_mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts

  training:
    build:
      context: ../..
      dockerfile: src/docker/training/training.Dockerfile
    image: rain-prediction-training:winner
    container_name: rain_prediction_training
    volumes:
      - ../../src:/app/src
      - ../../data:/app/data
      - ../../models:/app/models
      - ../../references:/app/references

  airflow:
    build:
      context: ../..
      dockerfile: src/docker/airflow/airflow.Dockerfile
    image: rain-prediction-airflow:local
    container_name: rain_prediction_airflow
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=False
      - AIRFLOW_PROJECT_DIR=/opt/airflow/project
      - PYTHONPATH=/opt/airflow/project
      - MLOPS_E2E_SCHEDULE=${MLOPS_E2E_SCHEDULE:-}
      - "MODEL_VERSIONING_SCHEDULE=${MODEL_VERSIONING_SCHEDULE-0 4 * * *}"
      - MLFLOW_TRACKING_URI=${AIRFLOW_MLFLOW_TRACKING_URI:-http://mlflow:5000}
      - MLFLOW_EXPERIMENT_NAME=${MLFLOW_EXPERIMENT_NAME:-rain_prediction_winner}
      - MLFLOW_REGISTERED_MODEL_NAME=${MLFLOW_REGISTERED_MODEL_NAME:-rain_prediction_final_winner}
      - MLFLOW_REGISTER_MODEL=${MLFLOW_REGISTER_MODEL:-true}
      - MLFLOW_TRACKING_USERNAME=${MLFLOW_TRACKING_USERNAME:-}
      - MLFLOW_TRACKING_PASSWORD=${MLFLOW_TRACKING_PASSWORD:-}
      - WEATHER_AUS_SOURCE=${WEATHER_AUS_SOURCE:-}
      - WEATHER_AUS_SOURCE_URL=${WEATHER_AUS_SOURCE_URL:-}
      - WEATHER_AUS_SOURCE_SHA256=${WEATHER_AUS_SOURCE_SHA256:-}
      - WEATHER_AUS_KAGGLE_DATASET=${WEATHER_AUS_KAGGLE_DATASET:-}
      - WEATHER_AUS_KAGGLE_FILE=${WEATHER_AUS_KAGGLE_FILE:-weatherAUS.csv}
      - WEATHER_AUS_DAILY_PROVIDER=${WEATHER_AUS_DAILY_PROVIDER:-}
      - WEATHER_AUS_DAILY_START_DATE=${WEATHER_AUS_DAILY_START_DATE:-}
      - WEATHER_AUS_DAILY_END_DATE=${WEATHER_AUS_DAILY_END_DATE:-}
      - WEATHER_AUS_DAILY_DAYS_BACK=${WEATHER_AUS_DAILY_DAYS_BACK:-7}
      - WEATHER_AUS_DAILY_END_LAG_DAYS=${WEATHER_AUS_DAILY_END_LAG_DAYS:-1}
      - WEATHER_AUS_OPEN_METEO_OUTPUT=${WEATHER_AUS_OPEN_METEO_OUTPUT:-/opt/airflow/project/data/incoming/open_meteo_weatherAUS_daily.csv}
      - OPEN_METEO_ARCHIVE_URL=${OPEN_METEO_ARCHIVE_URL:-https://archive-api.open-meteo.com/v1/archive}
      - WEATHER_AUS_SOURCE_MIN_ROWS=${WEATHER_AUS_SOURCE_MIN_ROWS:-1}
      - WEATHER_AUS_EXTRACT_MODE=${WEATHER_AUS_EXTRACT_MODE:-upsert}
      - KAGGLE_USERNAME=${KAGGLE_USERNAME:-}
      - KAGGLE_KEY=${KAGGLE_KEY:-}
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=airflow
      - _AIRFLOW_WWW_USER_PASSWORD=airflow
    volumes:
      - ../..:/opt/airflow/project
      - ../../airflow/dags:/opt/airflow/dags
      - ../../airflow/logs:/opt/airflow/logs
    depends_on:
      - mlflow
    command: standalone

  dashboard:
    build:
      context: ../..
      dockerfile: src/docker/frontend/frontend.Dockerfile
    image: rain-prediction-dashboard:winner
    container_name: rain_prediction_dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://gateway
    volumes:
      - ../../src:/app/src
    depends_on:
      - gateway

volumes:
  mlflow_data:
