# NOTE: This docker-compose.yml is for local development/testing only.
# The production/deployed setup runs via Kubernetes manifests in ./kubernetes/

services:
  fastapi:
    build:
      context: .
      dockerfile: docker/prediction-api/api.Dockerfile
    container_name: rain-prediction-api
    restart: unless-stopped
    expose:
      - "8502"
    volumes:
      - ./models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8502/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  prediction-traffic:
    image: python:3.12-slim
    container_name: prediction-traffic
    restart: unless-stopped
    working_dir: /app
    command: ["python", "generate_prediction_traffic.py"]
    environment:
      PREDICTION_API_URL: http://fastapi:8502/predict
      PREDICTION_BATCH_API_URL: http://fastapi:8502/predict/batch
      PREDICTION_HEALTH_URL: http://fastapi:8502/health
      PREDICTION_LOCATIONS_URL: http://fastapi:8502/locations
      PREDICTION_TRAFFIC_INTERVAL_SECONDS: "60"
      PREDICTION_TRAFFIC_USER: ines
    volumes:
      - ./docker/traffic-generator:/app:ro
    depends_on:
      fastapi:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: docker/gateway/nginx.Dockerfile
    container_name: nginx-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - fastapi

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    expose:
      - "9090"
    volumes:
      - ./deployment/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--web.external-url=https://localhost/alertmanager/'
      - '--web.route-prefix=/alertmanager/'
    expose:
      - "9093"
    volumes:
      - ./deployment/alertmanager:/etc/alertmanager:ro

  pushgateway:
    image: prom/pushgateway:latest
    container_name: pushgateway
    restart: unless-stopped
    expose:
      - "9091"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployment/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deployment/grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      # FIXED: Points to a real JSON file from your project structure
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/infra-dashboard.json
      # Required for Nginx routing via Port 443 subpath
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.17.2
    container_name: mlflow
    restart: unless-stopped
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    expose:
      - "9100"

  airflow:
    build:
      context: .
      dockerfile: docker/airflow/airflow.Dockerfile
    container_name: rain-prediction-airflow
    # Run the container as the host user's own UID (read from .env, see .env.example)
    # instead of the image's hardcoded UID 50000. Without this, every file Airflow
    # writes into the bind-mounted project dir (./:/opt/airflow/project) ends up
    # owned by UID 50000, which the host user then can't read/write — forcing
    # manual `sudo chown -R 50000:0 ...` after every run. This setting eliminates
    # that permanently and works for every developer/machine since AIRFLOW_UID
    # is per-person, not shared in git. Apache's own docker-compose docs use
    # this exact pattern: GID 0 (root group) is intentional — the Airflow image
    # grants group-root the needed permissions, so any UID + GID 0 works.
    user: "${AIRFLOW_UID:-50000}:0"
    command: >
      bash -c "
        set -e;
        airflow db migrate;
        airflow users create -u admin -p airflow -f Admin -l User -r Admin -e admin@example.com ||
        airflow users reset-password -u admin -p airflow;
        airflow scheduler &
        scheduler_pid=$$!;
        airflow webserver &
        webserver_pid=$$!;
        trap 'kill $$scheduler_pid $$webserver_pid 2>/dev/null || true' TERM INT;
        wait -n $$scheduler_pid $$webserver_pid;
        exit_code=$$?;
        kill $$scheduler_pid $$webserver_pid 2>/dev/null || true;
        exit $$exit_code
      "
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW_PROJECT_DIR: /opt/airflow/project
      MLOPS_E2E_SCHEDULE: "${MLOPS_E2E_SCHEDULE:-0 6 * * *}"
      MODEL_VERSIONING_SCHEDULE: "${MODEL_VERSIONING_SCHEDULE:-0 4 * * *}"
      DRIFT_MONITORING_SCHEDULE: "${DRIFT_MONITORING_SCHEDULE:-0 7 * * *}"
      PUSHGATEWAY_URL: pushgateway:9091
      MLFLOW_TRACKING_URI: ${AIRFLOW_MLFLOW_TRACKING_URI:-http://mlflow:5000}
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-rain_prediction_winner}
      MLFLOW_REGISTERED_MODEL_NAME: ${MLFLOW_REGISTERED_MODEL_NAME:-rain_prediction_final_winner}
      MLFLOW_REGISTER_MODEL: ${MLFLOW_REGISTER_MODEL:-true}
      MLFLOW_TRACKING_USERNAME: ${MLFLOW_TRACKING_USERNAME:-}
      MLFLOW_TRACKING_PASSWORD: ${MLFLOW_TRACKING_PASSWORD:-}
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    depends_on:
      mlflow:
        condition: service_healthy
      pushgateway:
        condition: service_started
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./:/opt/airflow/project
      - airflow_logs:/opt/airflow/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  prometheus_data:
  grafana_data:
  mlflow_data:
  airflow_logs:
