services:
  fastapi:
    build:
      context: .
      dockerfile: docker/prediction-api/api.Dockerfile
    restart: unless-stopped
    expose:
      - "8502"
    volumes:
      - ./models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8502/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  prediction-traffic:
    image: python:3.12-slim
    container_name: prediction-traffic
    restart: unless-stopped
    working_dir: /app
    command: ["python", "generate_prediction_traffic.py"]
    environment:
      PREDICTION_API_URL: http://fastapi:8502/predict
      PREDICTION_BATCH_API_URL: http://fastapi:8502/predict/batch
      PREDICTION_HEALTH_URL: http://fastapi:8502/health
      PREDICTION_LOCATIONS_URL: http://fastapi:8502/locations
      PREDICTION_TRAFFIC_INTERVAL_SECONDS: "60"
      PREDICTION_TRAFFIC_USER: ines
    volumes:
      - ./docker/traffic-generator:/app:ro
    depends_on:
      fastapi:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: docker/gateway/nginx.Dockerfile
    container_name: nginx-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - fastapi

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/rain_prediction_dashboard.json

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    expose:
      - "9100"

  airflow:
    build:
      context: .
      dockerfile: docker/airflow/airflow.Dockerfile
    container_name: airflow
    command: >
      bash -c "
        set -e;
        airflow db migrate;
        airflow users create -u admin -p airflow -f Admin -l User -r Admin -e admin@example.com ||
        airflow users reset-password -u admin -p airflow;
        airflow scheduler &
        exec airflow webserver
      "
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW_PROJECT_DIR: /opt/airflow/project
      MLOPS_E2E_SCHEDULE: ""
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: airflow
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_TRACKING_USERNAME: ${MLFLOW_TRACKING_USERNAME}
      MLFLOW_TRACKING_PASSWORD: ${MLFLOW_TRACKING_PASSWORD}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./:/opt/airflow/project 
      - airflow_logs:/opt/airflow/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  prometheus_data:
  grafana_data:
  airflow_logs:
